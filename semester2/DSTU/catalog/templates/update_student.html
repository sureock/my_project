{% extends "base.html" %}

<!DOCTYPE html>
<html>
    <head>
        {% block title %}
            Обновление/удаление студента - {{ block.super }}
        {% endblock %}
    </head>
<body>
    {% block content %}
    <h1>Обновить информацию о студенте</h1>
    <form method="post">
        {% csrf_token %}

        <label>
            Имя:
            <input type="text" name="first_name" value="{{ student.first_name }}" required>
        </label>
        <br><br>

        <label>
            Фамилия:
            <input type="text" name="last_name" value="{{ student.last_name }}" required>
        </label>
        <br><br>

        <button type="submit">Обновить</button>
    </form>

    <form method="post" action="{% url 'delete_student' student.id %}">
        {% csrf_token %}
        <button type="submit">Удалить</button>
    </form>
    {% endblock %}
</body>
